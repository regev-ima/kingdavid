name: Service Center — migrate + deploy

# Applies the Service Center DB migration and deploys the sendSms edge
# function using the Supabase secrets already configured in this repo
# (SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF). Runs on the feature branch
# so the preview's (shared) database gets the new columns + RPCs without any
# manual step, and on main so it stays applied after merge.
#
# The migration is idempotent (ADD COLUMN IF NOT EXISTS / CREATE OR REPLACE),
# so re-runs are safe. We apply ONLY this one file via the Management API
# query endpoint (not `db push`) so we never accidentally re-run older seed
# migrations.

on:
  push:
    branches:
      - main
      - claude/sleepy-bohr-Neu8S
    paths:
      - 'supabase/migrations/20260529000001_service_center.sql'
      - 'supabase/functions/sendSms/**'
      - '.github/workflows/service-center-deploy.yml'
  workflow_dispatch:

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply Service Center migration (Supabase Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260529000001_service_center.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy sendSms edge function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy sendSms --no-verify-jwt
