name: Performance indexes — apply migration

# Applies the lead-screen performance-index migration via the Supabase
# Management API on push to main. The migration is idempotent (every statement
# is CREATE INDEX IF NOT EXISTS), so re-runs are safe. We use the Management API
# query endpoint instead of `supabase db push` so we never accidentally re-run
# older seed migrations — same pattern as quote-defaults-migrate.yml and
# service-center-deploy.yml.
#
# To apply before merging, trigger it manually from the Actions tab
# (workflow_dispatch).

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/20260615000001_performance_indexes.sql'
      - '.github/workflows/performance-indexes-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply performance-indexes migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260615000001_performance_indexes.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
