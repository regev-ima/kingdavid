name: SMS Settings — apply migration

# Creates the sms_settings table (019 credentials, RLS-locked) via the Supabase
# Management API on push to main. Idempotent (CREATE TABLE IF NOT EXISTS +
# INSERT ... ON CONFLICT DO NOTHING) so re-runs are safe. Same pattern as
# dashboard-stats-migrate.yml / quote-defaults-migrate.yml.

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/20260625000001_sms_settings.sql'
      - '.github/workflows/sms-settings-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply sms_settings migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260625000001_sms_settings.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
