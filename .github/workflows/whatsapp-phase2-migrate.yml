name: WhatsApp Phase 2 — apply migration

# Creates whatsapp_templates + additive whatsapp_messages columns (sending,
# templates/shortcuts, PDF attachments) via the Supabase Management API on
# push to main. Idempotent, so re-runs are safe. Same pattern as
# whatsapp-chat-migrate.yml.
#
# NOTE: the dev-branch trigger below is temporary, for preview testing during
# the phase-2 build. Remove it before/after merging (see plan §8 item 7).

on:
  push:
    branches:
      - main
      - claude/whatsapp-phase2-messaging-n4odvs
    paths:
      - 'supabase/migrations/20260710000001_whatsapp_phase2.sql'
      - '.github/workflows/whatsapp-phase2-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply whatsapp_phase2 migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260710000001_whatsapp_phase2.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
