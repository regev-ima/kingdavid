name: Deploy syncVoicenterCalls (diagnostics)

# Deploys only the syncVoicenterCalls edge function from this feature branch so
# the ?debug=1 / ?days=N diagnostics + backfill window are live without waiting
# for a merge to main. Mirrors deploy-functions.yml's auth + flags.

on:
  push:
    branches:
      - main
      - claude/zen-mayer-odR18
    paths:
      - 'supabase/functions/syncVoicenterCalls/**'
      - '.github/workflows/deploy-voicenter-sync.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy syncVoicenterCalls
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy syncVoicenterCalls --no-verify-jwt
