name: Remove quote-attached template — apply migration

# Deletes the misleading "הצעת מחיר מצורפת" default WhatsApp template (text only,
# doesn't attach the PDF) via the Supabase Management API on push to main.
# Idempotent, so re-runs are safe. Same pattern as whatsapp-chat-tags-migrate.yml.

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/20260722000003_remove_quote_attached_template.sql'
      - '.github/workflows/remove-quote-attached-template-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply remove-quote-attached-template migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260722000003_remove_quote_attached_template.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
