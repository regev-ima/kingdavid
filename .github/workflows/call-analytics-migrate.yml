name: Call Analytics — apply migration

# Applies the call_analytics_views migration (read-only aggregation/detail
# views + indexes on call_logs) via the Supabase Management API. Purely
# additive and idempotent (CREATE INDEX IF NOT EXISTS, CREATE OR REPLACE
# VIEW), so re-runs are safe — same pattern as rep-management-migrate.yml.
# Runs on the feature branch too so the preview deployment has the views.

on:
  push:
    branches:
      - main
      - claude/blissful-clarke-42jo00
    paths:
      - 'supabase/migrations/20260615000002_call_analytics_views.sql'
      - '.github/workflows/call-analytics-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply call_analytics_views migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260615000002_call_analytics_views.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
