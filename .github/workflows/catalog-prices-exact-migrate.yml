name: Catalog prices exact incl-VAT — apply migration

# Sets product_variations.final_price to full precision so incl-VAT (×1.18)
# reproduces the 2026 price-list value exactly (fixes the ~₪1 rounding drift).
# Idempotent (absolute SET, no-op for unmatched SKUs). Same pattern as the other
# *-migrate workflows. Can also be run manually via workflow_dispatch.

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/20260721000001_catalog_prices_exact_incl_vat.sql'
      - '.github/workflows/catalog-prices-exact-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply catalog price precision migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260721000001_catalog_prices_exact_incl_vat.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
