name: Rep Management — apply migration

# Applies the rep_management migration (new nullable columns on `users` +
# an additive permissions-escalation guard trigger) via the Supabase
# Management API. The migration is purely additive and idempotent
# (ADD COLUMN IF NOT EXISTS, CREATE OR REPLACE, DROP TRIGGER IF EXISTS), so
# re-runs are safe — same pattern as quote-defaults-migrate.yml.
#
# We also run on the feature branch (not just main) because preview
# deployments share the same Supabase project: the columns must exist for
# the new "נהל נציג" modal to read/write them on the preview URL. Since the
# change is additive and unused by existing code, applying it early has no
# effect on current behaviour.

on:
  push:
    branches:
      - main
      - claude/blissful-clarke-42jo00
    paths:
      - 'supabase/migrations/20260615000001_rep_management.sql'
      - '.github/workflows/rep-management-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply rep_management migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260615000001_rep_management.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
