name: Menu Settings — apply migration

# Creates the menu_settings singleton (server-side sidebar preferences) via the
# Supabase Management API. Idempotent (CREATE TABLE IF NOT EXISTS + seeded
# INSERT ... ON CONFLICT DO NOTHING), so re-runs are safe. Same pattern as
# sms-settings-migrate.yml / whatsapp-chat-migrate.yml.
#
# The feature branch is in the triggers so the fix is testable on the Vercel
# preview before merging; remove it once merged.

on:
  push:
    branches:
      - main
      - claude/clever-planck-qu7do6
    paths:
      - 'supabase/migrations/20260721000001_menu_settings.sql'
      - '.github/workflows/menu-settings-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply menu_settings migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF secrets"; exit 1
          fi
          f=supabase/migrations/20260721000001_menu_settings.sql
          payload=$(jq -Rs '{query: .}' "$f")
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "Management API HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" -lt 400
