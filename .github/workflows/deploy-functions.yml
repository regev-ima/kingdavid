name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
      - claude/check-production-requirements-hO64j
    paths:
      - 'supabase/functions/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          FUNCTIONS=(
            claimPendingLeads
            clickToCall
            createNotification
            createSalesTaskAPI
            createSalesTaskForNewLead
            exportDashboardCsv
            fetchSheetsColumns
            getDashboardStats
            getVoicecenterCredentials
            importCustomersFromSheets
            importLeadsFromSheets
            importSalesTasksFromSheets
            importUsersFromSheets
            initBulkUpdate
            processBulkUpdateBatch
            processTransferBatch
            saveVoicecenterCredentials
            scheduleShipments
            syncVoicenterCalls
            trackLeadAssignment
            transferRepData
            updateDashboardCounters
            updateLeadCounterOnChange
            updateTaskCounters
            uploadLeads
            upsertLead
            importProductsFromSheets
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --no-verify-jwt || echo "Failed to deploy $fn"
          done
